name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dependencies
        # Install the project itself so the full dependency set declared in
        # pyproject.toml (requests, dnspython, rich, cryptography, PyYAML) is
        # pulled in -- requirements.txt is only a runtime subset.
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  typecheck:
    name: Type check (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and type-check tooling
        run: |
          python -m pip install --upgrade pip
          pip install . mypy types-requests types-PyYAML

      - name: Run mypy
        run: mypy .
