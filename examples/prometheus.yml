# Minimal Prometheus config that scrapes Inquisition's /metrics endpoint.
# Used by examples/docker-compose.yml.
global:
  scrape_interval: 30s

# Alerting rules for Inquisition's exported metrics (see inquisition.rules.yml).
rule_files:
  - /etc/prometheus/inquisition.rules.yml

scrape_configs:
  - job_name: inquisition
    metrics_path: /metrics
    static_configs:
      - targets: ["inquisition:9090"]
