# Example: run Inquisition in watch mode behind Prometheus.
#
#   docker compose -f examples/docker-compose.yml up --build
#
# Inquisition scans the fleet hourly, serves /metrics (+ /healthz, /readyz) on
# :9090, and writes a rotating audit log. Prometheus scrapes it. Edit fleet.yaml
# to list hosts you are authorized to scan. Send a run-now / reload / drain with:
#   docker compose kill -s SIGUSR1 inquisition   # scan immediately
#   docker compose kill -s SIGHUP  inquisition   # reload fleet.yaml
#   docker compose stop inquisition              # SIGTERM → graceful drain
services:
  inquisition:
    build: ..
    command:
      - --fleet-config=/etc/inquisition/fleet.yaml
      - --yes
      - --watch=3600
      - --watch-jitter=30
      - --metrics-serve=9090
      - --audit-log=/data/audit.jsonl
      - --audit-max-bytes=10485760
    ports:
      - "9090:9090"   # /metrics, /healthz, /readyz
    volumes:
      - ./fleet.yaml:/etc/inquisition/fleet.yaml:ro
      - inquisition-data:/data
    stop_grace_period: 5m   # allow the in-flight scan cycle to drain on SIGTERM
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9090/healthz',timeout=5).status==200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"   # Prometheus UI
    depends_on:
      - inquisition

volumes:
  inquisition-data:
